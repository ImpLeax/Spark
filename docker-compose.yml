version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: spark_db
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spark_network

  redis:
    image: redis:7
    container_name: spark_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - spark_network

  backend:
    build: ./backend
    container_name: spark_backend
    restart: always
    volumes:
      - static_volume:/spark_backend/staticfiles
      - media_volume:/spark_backend/media
    env_file:
      - .env.prod
    environment:
      - ENV_FILE=.env.prod
    depends_on:
      - db
      - redis
    networks:
      - spark_network

  frontend:
    build: ./frontend
    container_name: spark_frontend_builder
    env_file:
      - .env.prod
    command: sh -c "cp -a dist/. /frontend_build/"
    volumes:
      - frontend_build:/frontend_build
    networks:
      - spark_network

  nginx:
    image: nginx:alpine
    container_name: spark_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html
      - static_volume:/static
      - media_volume:/media
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - spark_network

  certbot:
    image: certbot/certbot
    container_name: spark_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

networks:
  spark_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  frontend_build:
  certbot_conf:
  certbot_www: