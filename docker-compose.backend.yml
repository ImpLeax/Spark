version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: spark_app_backend_db_container
    restart: always
    environment:
      POSTGRES_DB: spark
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 12344321
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: spark_app_backend
    restart: always
    command: sh -c "uv run manage.py migrate && uv run manage.py makemigrations  && uv run manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - POSTGRES_DB=spark
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=12344321
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432

volumes:
  postgres_data: